<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        /* styles.css */
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 80%;
            margin: 0 auto;
            padding: 20px;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        #post-form {
            margin-bottom: 20px;
        }

        #post-form input, #post-form textarea {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
        }

        #posts {
            margin-top: 20px;
        }

        .post {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        .post h2 {
            margin: 0 0 10px;
        }

        .post p {
            margin: 0;
        }

    </style>
</head>
<body>
    <div class="container">
        <h1>My Blog</h1>
        <div id="post-form">
            <input type="text" id="title" placeholder="Post Title">
            <textarea id="content" placeholder="Post Content"></textarea>
            <button id="add-post">Add Post</button>
        </div>
        <div id="posts">
            <!-- Blog posts will be appended here -->
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-1.12.4.min.js"></script>
    <script src="../script.js"></script>
</body>
</html>
